apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-operator-controller-manager
  namespace: opentelemetry-operator-system
spec:
  template:
    spec:
      containers:
        - name: manager
          args:
            - --zap-log-level=info
            - --zap-time-encoding=rfc3339nano
            - --feature-gates=+operator.clusterobservability
